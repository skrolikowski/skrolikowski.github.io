<div class="row media">
    {% if include.images %}
        <div class="col-xs-12 col-md-3 py-3">
            <a href="{{ post.url | prepend: site.baseurl }}" title="{{ post.title }}">
                <img class="align-self-start rounded w-100 mr-3" src="{{ post.cover }}" alt="{{ post.title }}">
            </a>
        </div>
    {% endif %}
    <div class="col media-body py-3">
        <h5>
            <small class="float-right text-muted">{{ post.date | date: "%b %-d, %Y" }}</small>
            <a href="{{ post.url | prepend: site.baseurl }}" title="{{ post.title }}">{{ post.title }}</a>
        </h5>
        <p>
            {{ post.excerpt }}
            <br />
            {% for tag in post.tags %}
                <small>
                    <span class="badge badge-dark">{{ tag }}</span>
                </small>
            {% endfor %}
        </p>
    </div>
</div>
