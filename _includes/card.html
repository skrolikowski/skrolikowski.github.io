<div class="col-sm-12 col-md-6 col-lg-4 my-3">
    <div class="card">
        <img src="{{ page.image }}" class="card-img" alt="{{ page.title }}" />
        <a href="{{ page.url }}" title="{{ page.title }}">
            <div class="card-img-overlay d-flex">
                <div class="w-75 my-auto mx-auto text-center bg-light rounded p-1" style="opacity: 0.65">
                    <h5 class="text-uppercase text-dark font-weight-bold">
                        {{ page.title }}
                    </h5>
                </div>
            </div>
        </a>
    </div>
</div>
