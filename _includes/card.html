<div class="col-sm-12 col-md-6 col-lg-4 my-3">
    <div class="card">
        <img src="{{ page.image }}" class="card-img" alt="{{ page.title }}" />
        <a href="{{ page.url }}" title="{{ page.title }}">
            <div class="card-img-overlay d-flex">
                <div class="w-100 my-auto text-center">
                    <h3 style="font-size:3vh; opacity: 0.80;">
                        <span class="text-uppercase badge badge-light">{{ page.title }}</span>
                    </h3>
                </div>
            </div>
        </a>
    </div>
</div>
