<div class="col-sm-12 col-md-6 my-3">
    <div class="card">
        <img src="{{ images[page.cover].src }}" class="card-img" alt="{{ images[page.cover].alt }}" />
        <a href="{{page.url}}" title="{{ page.title }}">
            <div class="card-img-overlay d-flex">
                <div class="w-100 my-auto text-center">
                    <h2 style="opacity: 0.75;">
                        <span class="text-uppercase badge badge-dark">{{ page.title }}</span>
                    </h2>
                </div>
            </div>
        </a>
    </div>
</div>
