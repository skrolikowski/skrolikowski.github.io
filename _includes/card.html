<div class="col-xs-12 col-sm-6 col-md-4 my-3">
    <div class="card bg-white border-secondary">
        <a href="{{page.url}}" title="{{ page.title }}">
            <img src="{{ page.cover }}" class="card-img-top" alt="{{ page.title }}" />
        </a>
        <div class="card-body">
            <p class="card-text">
                <a href="{{ page.url | prepend: site.baseurl }}" title="{{ page.title }}" class="card-link">{{ page.title }}</a>
            </p>
        </div>
    </div>
</div>
