<ul class="nav">
    <li class="nav-item">
        <a class="nav-link py-0 px-2" href="/{{ page.collection }}">{{ page.collection | capitalize }}</a>
    </li>
    <li class="nav-item">/</li>
    {% for category in page.categories %}
        <li class="nav-item">
            <a href="/{{ page.collection }}/{{ category }}" class="nav-link py-0 px-2" style="text-transform: capitalize;">{{ category | replace: "-", " " }}</a>
        </li>
        <li class="nav-item">/</li>
    {% endfor %}
    <li class="nav-item">
        <a class="nav-link disabled py-0 px-2" aria-disabled="true">{{ page.title }}</a>
    </li>
</ul>
