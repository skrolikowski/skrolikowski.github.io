-
  title: E/Generation
  link: https://github.com/skrolikowski/E-Generation
  text: >
    E/Generation (still looking for a better name) is a
    <a href="https://en.wikipedia.org/wiki/D/Generation" target="_blank" class="card-link">D/Generation</a>
    game clone started a couple months ago. The game is an isometric, room-by-room progression with varying
    enemies in each room that must be cleared out. Each floor offers a more difficult challenge to the player.
    Still a WIP; decided to port it to C# .Net + MonoGame.
  technologies:
    - Enemy AI
    - Collision detection/response
    - Asset creation
    - Pathfinding
    - Level Design
  software:
    - Sublime Text 3
    - Love2D
    - AssetForge
  tags: ['lua', 'love2d', 'game-dev', 'programming', 'game-libraries', 'game-framework', 'level-design']