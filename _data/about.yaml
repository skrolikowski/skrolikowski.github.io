base:
  synopsis: >
    A passionate and determined problem solver, with respect to the approach.
    An adept apprentice with an endless quest for quality and clarity.
    Looking towards future, while maintaining focus on the present task.
    Trustworthy and loyal, but not afraid to offer up challenge.
    Receptive and appreciative, and will annoy you with lots of questions.
  name: Shane Krolikowski
  website: shanekrolikowski.com
  address: Queen Anne, Seattle, WA
  phone: 206.910.6260
  email: skrolikowski@gmail.com
intro:
  sections:
    - >
      <p>My name is Shane Krolikowski.
      Tacoma, WA born, currently residing in the Queen Anne neighborhood of Seattle, WA.
      I have several disciplines, but my most passionate one is programming.
      It started out as an evening hobby, but soon became an obsession.
      I started out in the Web Development field, but recently turned my interests to Game &amp; Application Development.
      It is my goal to continually challenge myself, learn from my failures, and grow.
      Try, fail, learn, repeat.</p>
    - >
      <p>I am a passionate and determined problem solver.
      I strive to learn the next topic, while focused on the current task in hand.
      Humble &amp; cooperative, even though I tend to work on my own.
      Trustworthy &amp; loyal, but I am not afraid to offer up challenge.
      Perceptive &amp; attentive, but will still probably ask a thousand questions.</p>

